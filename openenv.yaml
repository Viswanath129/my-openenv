spec_version: 1
name: InboxIQ
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: "InboxIQ — OpenEnv-compliant RL environment for intelligent email inbox triage."
hardware: cpu-basic
tags:
  - openenv
  - reinforcement-learning
  - email-triage
  - real-world-task

tasks:
  - id: task1
    name: "Precise Triage"
    description: "Triage a single email correctly. Tests basic action selection — classify spam vs legitimate and choose the optimal action."
    difficulty: easy
    max_steps: 5
    prompt: "Your inbox contains one email. Analyze its sentiment, urgency, and spam score. Execute the most appropriate action (open, delete, or escalate) to maximize reward."

  - id: task2
    name: "Incentive Cleanup"
    description: "Process a backlog of 3 emails with mixed types (spam, work, support). Tests prioritization and batch decision-making."
    difficulty: medium
    max_steps: 10
    prompt: "You have a backlog of 3 emails. Some are spam, some are urgent work requests. Process all of them efficiently. Remember: deleting a legitimate email is heavily penalized."

  - id: task3
    name: "Chaos Management"
    description: "Handle 5 initial emails with continuous random arrivals. Tests real-time triage under time pressure and evolving state."
    difficulty: hard
    max_steps: 20
    prompt: "Total Chaos! 5 emails are pending, and more may arrive. Prioritize 'Aggressive' sentiment for escalation and 'HIGH' urgency for immediate opening. Efficiency and accuracy are critical."

actions:
  type: object
  properties:
    action_type:
      type: string
      enum: ["open", "delete", "defer", "escalate"]
      description: "The triage action to perform on the target email"
    email_id:
      type: string
      description: "The unique identifier of the email to act upon"

observations:
  type: object
  properties:
    inbox:
      type: array
      description: "List of email objects with fields: id, sender, subject, type, urgency, sentiment, sentiment_confidence, spam_score, confidence, wait"
    steps:
      type: integer
      description: "Current step number in the episode"
    task:
      type: string
      description: "Current task identifier"
    max_steps:
      type: integer
      description: "Maximum allowed steps for this task"
    total_reward:
      type: number
      description: "Cumulative reward so far in the episode"
    reward:
      type: number
      description: "Reward received for the last action"
    done:
      type: boolean
      description: "Whether the episode has ended"
    info:
      type: object
      description: "Additional information about the step"

grader:
  type: normalized
  range: [0.0, 1.0]
  description: "Episode score normalized against optimal theoretical reward per task. Deterministic given identical episode trajectory."
