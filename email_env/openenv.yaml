name: email_triage_env
description: "TriageAI - RL environment for intelligent email inbox triage"
version: "3.0"
port: 8000
app: src.app:app

tasks:
  - id: task1
    name: "Single Email Triage"
    difficulty: easy
    max_steps: 5

  - id: task2
    name: "Backlog Processing"
    difficulty: medium
    max_steps: 10

  - id: task3
    name: "Dynamic Inbox Stream"
    difficulty: hard
    max_steps: 20

grader:
  type: normalized
  range: [0.0, 1.0]
